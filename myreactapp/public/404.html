<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;

      window.location.replace(
        window.location.origin + "/#/" + path.replace(/^\/+/, "") + search + hash
      );
    </script>
  </head>
  <body></body>
</html>
